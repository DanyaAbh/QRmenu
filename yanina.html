<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Янина | Блинная</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blur: blur(28px);
    --blur-sm: blur(14px);
    --accent: #ff7a3c;
    --accent2: #ff4f8b;
    --text: #1a0f0a;
    --text-soft: rgba(35, 18, 8, 0.72);
    --text-light: rgba(30, 15, 5, 0.55);
    --shadow-sm: 0 2px 16px rgba(180, 80, 20, 0.10);
    --surface: rgba(255, 255, 255, 0.28);
    --surface-strong: rgba(255, 255, 255, 0.40);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    font-family: "Nunito", sans-serif;
    background: linear-gradient(145deg, #ffe8d6 0%, #ffd4b8 24%, #ffb8c8 52%, #e8d3ff 76%, #c8e6ff 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    top: -88px;
    right: -72px;
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(255, 160, 80, 0.35) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: drift1 8s ease-in-out infinite alternate;
  }

  body::after {
    content: "";
    position: fixed;
    bottom: 72px;
    left: -92px;
    width: 280px;
    height: 280px;
    background: radial-gradient(circle, rgba(180, 100, 255, 0.24) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
    animation: drift2 10s ease-in-out infinite alternate;
  }

  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(20px, 28px) scale(1.1); }
  }

  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(-24px, -20px) scale(1.08); }
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(255, 255, 255, 0.24);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid rgba(255, 255, 255, 0.45);
    padding: max(14px, env(safe-area-inset-top)) 20px 12px;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6) inset, 0 4px 20px rgba(180, 80, 20, 0.08);
  }

  .brand {
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-align: center;
  }

  .logo-wrap {
    width: min(150px, 44%);
    padding: 4px 0 0;
    margin: 0 auto;
  }

  .logo-mark {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
    mix-blend-mode: multiply;
    filter: drop-shadow(0 8px 18px rgba(120, 50, 10, 0.10));
  }

  .logo-sub {
    font-size: 16px;
    font-weight: 800;
    color: rgba(70, 32, 10, 0.76);
    line-height: 1.3;
    max-width: 320px;
    margin: 0 auto;
    text-wrap: balance;
  }

  .header-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .cats,
  .subcats {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .cats::-webkit-scrollbar,
  .subcats::-webkit-scrollbar {
    display: none;
  }

  .subcats {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    pointer-events: none;
    transform: translateY(-6px);
    transition: max-height 0.24s ease, opacity 0.2s ease, transform 0.2s ease;
  }

  .subcats.show {
    max-height: 52px;
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .cat,
  .subcat {
    white-space: nowrap;
    padding: 8px 15px;
    border-radius: 20px;
    flex-shrink: 0;
    border: 1px solid rgba(255, 255, 255, 0.50);
    background: rgba(255, 255, 255, 0.22);
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
    color: var(--text);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset;
    font-family: "Nunito", sans-serif;
  }

  .subcat {
    padding: 7px 13px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(255, 255, 255, 0.18);
    color: rgba(70, 32, 10, 0.72);
  }

  .cat.active,
  .subcat.active {
    background: rgba(255, 122, 60, 0.78);
    border-color: rgba(255, 160, 100, 0.6);
    color: #fff;
    box-shadow: 0 1px 0 rgba(255, 200, 150, 0.5) inset, 0 4px 12px rgba(255, 100, 40, 0.30);
  }

  .subcat.active {
    background: rgba(255, 122, 60, 0.24);
    color: var(--accent);
    box-shadow: 0 1px 0 rgba(255, 200, 150, 0.5) inset, 0 4px 10px rgba(255, 100, 40, 0.16);
  }

  .list {
    padding: 14px 0 136px;
    position: relative;
    z-index: 1;
  }

  .menu-section {
    position: relative;
    scroll-margin-top: calc(var(--header-offset, 170px) + 14px);
  }

  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(80, 40, 10, 0.46);
    padding: 22px 20px 10px;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .card {
    margin: 0 14px 16px;
    border-radius: 28px;
    overflow: hidden;
    background: var(--surface);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid rgba(255, 255, 255, 0.56);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.80) inset, 0 -1px 0 rgba(0, 0, 0, 0.04) inset,
      0 12px 40px rgba(180, 80, 20, 0.13), 0 2px 8px rgba(180, 80, 20, 0.08);
    animation: fadeUp 0.45s cubic-bezier(.22, 1, .36, 1) both;
    position: relative;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.30) 0%, transparent 100%);
    border-radius: 28px 28px 0 0;
    pointer-events: none;
    z-index: 0;
  }

  .card:active {
    transform: scale(0.985);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    position: relative;
    padding: 20px 0 0 20px;
    min-height: 180px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    overflow: hidden;
    z-index: 1;
  }

  .card-top-text {
    flex: 1;
    padding-top: 4px;
    padding-right: 8px;
  }

  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 999px;
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
  }

  .badge-soft {
    background: rgba(255, 255, 255, 0.46);
    border: 1px solid rgba(255, 255, 255, 0.68);
    color: rgba(70, 32, 10, 0.70);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
  }

  .badge-lead {
    background: rgba(90, 165, 105, 0.20);
    border: 1px solid rgba(115, 180, 120, 0.48);
    color: rgba(44, 108, 52, 0.92);
    box-shadow: 0 1px 0 rgba(210, 250, 214, 0.66) inset;
  }

  .dish-name {
    font-family: "Playfair Display", serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.16;
    margin-bottom: 6px;
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
  }

  .dish-desc,
  .dish-note {
    font-size: 13px;
    font-weight: 500;
    color: rgba(50, 25, 5, 0.62);
    line-height: 1.65;
    margin-bottom: 14px;
  }

  .dish-photo-ph {
    width: 185px;
    min-width: 185px;
    height: 185px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 78px;
    line-height: 1;
    background: transparent;
    border: none;
    box-shadow: none;
    align-self: flex-end;
    margin-bottom: -2px;
  }

  .dish-photo {
    width: 185px;
    height: 185px;
    object-fit: contain;
    object-position: center bottom;
    flex-shrink: 0;
    align-self: flex-end;
    margin-bottom: -2px;
    filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.10));
  }

  .dish-photo.photo-fit-wide {
    width: 166px;
    height: 166px;
    margin-right: 10px;
    margin-bottom: 2px;
  }

  .dish-photo.photo-fit-medium {
    width: 160px;
    height: 160px;
    margin-right: 12px;
    margin-bottom: 4px;
  }

  .dish-photo.photo-fit-compact {
    width: 154px;
    height: 154px;
    margin-right: 14px;
    margin-bottom: 6px;
  }

  .dish-photo.photo-fit-drink {
    width: 148px;
    height: 148px;
    margin-right: 14px;
    margin-bottom: 4px;
  }

  .card-body {
    padding: 14px 20px 20px;
    position: relative;
    z-index: 1;
  }

  .packaged-card .card-top {
    min-height: 0;
    padding: 18px 20px 0;
    align-items: flex-start;
  }

  .packaged-card .card-top-text {
    padding-right: 0;
  }

  .group-photo-ph {
    width: 58px;
    min-width: 58px;
    height: 58px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    background: rgba(255, 255, 255, 0.34);
    border: 1px solid rgba(255, 255, 255, 0.58);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.82) inset;
    margin-left: 12px;
    flex-shrink: 0;
  }

  .option-heading,
  .tags-label,
  .tops-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(140, 80, 30, 0.46);
    margin-bottom: 8px;
  }

  .variant-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
    margin-bottom: 16px;
  }

  .variant-scroll::-webkit-scrollbar {
    display: none;
  }

  .variant-chip {
    border: 1px solid rgba(255, 255, 255, 0.62);
    background: rgba(255, 255, 255, 0.38);
    border-radius: 18px;
    padding: 10px 12px;
    min-width: 92px;
    color: var(--text);
    font-size: 12px;
    font-weight: 800;
    line-height: 1.2;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset, var(--shadow-sm);
    cursor: pointer;
    transition: all 0.18s ease;
    font-family: "Nunito", sans-serif;
    flex-shrink: 0;
  }

  .variant-chip span {
    font-size: 11px;
    color: var(--accent);
  }

  .variant-chip.selected {
    background: rgba(255, 122, 60, 0.22);
    border-color: rgba(255, 140, 80, 0.60);
    box-shadow: 0 1px 0 rgba(255, 200, 150, 0.5) inset, 0 4px 14px rgba(255, 100, 40, 0.18);
  }

  .tags-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    font-family: "Nunito", sans-serif;
    white-space: nowrap;
    user-select: none;
    backdrop-filter: var(--blur-sm);
    -webkit-backdrop-filter: var(--blur-sm);
  }

  .tag-remove {
    background: rgba(255, 80, 60, 0.12);
    border: 1px solid rgba(255, 120, 90, 0.35);
    color: rgba(200, 60, 30, 0.90);
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: 0 1px 0 rgba(255, 200, 180, 0.4) inset;
  }

  .tag-remove::before {
    content: "✕ ";
    font-size: 9px;
  }

  .tag-remove.removed {
    opacity: 0.35;
    text-decoration: line-through;
    background: rgba(255, 255, 255, 0.20);
    border-color: rgba(255, 255, 255, 0.35);
    color: rgba(60, 30, 10, 0.50);
  }

  .tag-remove.removed::before {
    content: "+ ";
  }

  .tops-group-block {
    margin-bottom: 14px;
  }

  .tops-group-block:last-of-type {
    margin-bottom: 16px;
  }

  .tops-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 10px;
    padding-bottom: 2px;
  }

  .tops-tabs::-webkit-scrollbar {
    display: none;
  }

  .tops-tab {
    border: 1px solid rgba(255, 255, 255, 0.60);
    background: rgba(255, 255, 255, 0.24);
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 800;
    color: rgba(70, 32, 10, 0.72);
    cursor: pointer;
    white-space: nowrap;
    font-family: "Nunito", sans-serif;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
    flex-shrink: 0;
  }

  .tops-tab.active {
    background: rgba(255, 122, 60, 0.18);
    border-color: rgba(255, 140, 80, 0.60);
    color: var(--accent);
  }

  .tops-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 4px;
    padding-bottom: 4px;
  }

  .tops-scroll::-webkit-scrollbar {
    display: none;
  }

  .tops-scroll:not(.active) {
    display: none;
  }

  .top-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 78px;
    border: 1px solid rgba(255, 255, 255, 0.62);
    background: rgba(255, 255, 255, 0.38);
    border-radius: 20px;
    padding: 10px 8px 9px;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.85) inset, var(--shadow-sm);
    position: relative;
    gap: 2px;
    font-family: "Nunito", sans-serif;
    flex-shrink: 0;
  }

  .top-card:active {
    transform: scale(0.92);
  }

  .top-card.selected {
    background: rgba(255, 122, 60, 0.22);
    border-color: rgba(255, 140, 80, 0.60);
    box-shadow: 0 1px 0 rgba(255, 200, 150, 0.5) inset, 0 4px 14px rgba(255, 100, 40, 0.18);
  }

  .top-card.selected::after {
    content: "✓";
    position: absolute;
    top: 5px;
    right: 7px;
    font-size: 10px;
    color: var(--accent);
    font-weight: 900;
  }

  .top-img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    margin-bottom: 6px;
    filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.12));
  }

  .top-icon {
    width: 52px;
    height: 52px;
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    background: rgba(255, 255, 255, 0.44);
    border: 1px solid rgba(255, 255, 255, 0.58);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
    margin-bottom: 6px;
  }

  .top-name {
    font-size: 10px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    text-align: center;
  }

  .top-note {
    font-size: 8.5px;
    font-weight: 700;
    color: rgba(90, 58, 32, 0.48);
    line-height: 1.12;
    text-align: center;
    max-width: 100%;
  }

  .top-price {
    font-size: 9.5px;
    font-weight: 800;
    color: var(--accent);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding-top: 4px;
  }

  .dish-weight {
    font-size: 12px;
    color: rgba(86, 49, 19, 0.58);
    font-weight: 700;
    min-height: 18px;
    line-height: 1.35;
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .price-pill {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.2px;
    background: linear-gradient(135deg, rgba(255, 130, 60, 0.92), rgba(255, 80, 80, 0.82));
    color: #fff;
    height: 38px;
    padding: 0 16px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    box-shadow: 0 3px 12px rgba(255, 100, 60, 0.28);
  }

  .add-circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(255, 130, 60, 0.92), rgba(255, 80, 80, 0.82));
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(255, 100, 40, 0.30);
    transition: transform 0.12s ease, background 0.2s ease;
    font-family: "Nunito", sans-serif;
  }

  .add-circle:active {
    transform: scale(0.88);
  }

  .add-circle.done {
    background: rgba(50, 180, 100, 0.85);
    font-size: 15px;
  }

  .group-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .group-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.28);
  }

  .group-row:first-child {
    padding-top: 2px;
  }

  .group-row:last-child {
    padding-bottom: 0;
    border-bottom: none;
  }

  .group-copy {
    flex: 1;
    min-width: 0;
  }

  .group-name {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  .group-note {
    font-size: 11px;
    font-weight: 700;
    color: rgba(90, 58, 32, 0.48);
    line-height: 1.35;
    margin-top: 3px;
  }

  .group-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .group-price {
    font-size: 12px;
    font-weight: 800;
    color: var(--accent);
    min-width: 52px;
    text-align: right;
  }

  .group-add {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, rgba(255, 130, 60, 0.92), rgba(255, 80, 80, 0.82));
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 10px rgba(255, 100, 40, 0.22);
    transition: transform 0.12s ease, background 0.2s ease;
    font-family: "Nunito", sans-serif;
  }

  .group-add:active {
    transform: scale(0.9);
  }

  .group-add.done {
    background: rgba(50, 180, 100, 0.85);
    font-size: 14px;
  }

  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.28);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
    z-index: 190;
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
  }

  .cart-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .cart {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 100%;
    max-width: 430px;
    background: var(--surface-strong);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 28px 28px 0 0;
    border-top: 1px solid rgba(255, 255, 255, 0.70);
    box-shadow: 0 1px 0 rgba(255, 255, 255, 0.90) inset, 0 -8px 40px rgba(180, 80, 20, 0.16);
    padding: 16px 20px max(36px, calc(env(safe-area-inset-bottom) + 16px));
    transition: transform 0.35s cubic-bezier(.34, 1.56, .64, 1);
    z-index: 200;
  }

  .cart.show {
    transform: translateX(-50%) translateY(0);
  }

  .cart.open .cart-expanded {
    max-height: 72vh;
    overflow-y: auto;
  }

  .cart-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .cart-left {
    display: flex;

            { id: "lipton", name: "ЛИПТОН ПЛАСТИК 0,5 Л ПЕРСИК / ЗЕЛЕНЫЙ ЧАЙ / ЛИМОН", displayName: "Lipton", note: "0,5 л · персик / зелёный чай / лимон", price: 100 }
          ]
        }
      ]
    }
  ];

  const DRINK_NAV_ITEMS = [
    { id: "coffee", label: "Кофе", target: "coffee" },
    { id: "tea", label: "Чай", target: "tea" },
    { id: "cocoa", label: "Какао", target: "cocoa" },
    { id: "lemonade", label: "Лимонады", target: "lemonade" },
    { id: "fresh", label: "Фреш", target: "fresh" },
    { id: "smoothies", label: "Смузи", target: "smoothies" },
    { id: "milkshakes", label: "Милкшейки", target: "milkshakes" },
    { id: "packaged-drinks", label: "Вода и соки", target: "packaged-drinks" }
  ];
  const DRINK_SECTION_IDS = DRINK_NAV_ITEMS.map((item) => item.id);
  const TOP_NAV_BY_SECTION = {
    blini: "blini",
    desserts: "desserts",
    pizza: "pizza",
    bread: "bread",
    soups: "soups",
    coffee: "drinks",
    tea: "drinks",
    cocoa: "drinks",
    lemonade: "drinks",
    fresh: "drinks",
    smoothies: "drinks",
    milkshakes: "drinks",
    "packaged-drinks": "drinks"
  };

  const ITEM_INDEX = new Map();
  let cartItems = [];
  let activeTopNav = "blini";
  let activeDrinkNav = "coffee";
  let scrollTicking = false;

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll("\"", "&quot;")
      .replaceAll("'", "&#39;");
  }

  function formatPrice(value) {
    return value + " ₽";
  }

  function pluralize(count, one, few, many) {
    const mod10 = count % 10;
    const mod100 = count % 100;
    if (mod10 === 1 && mod100 !== 11) return one;
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return few;
    return many;
  }

  function formatItemCount(count) {
    if (count === 0) return "Корзина пуста";
    return count + " " + pluralize(count, "позиция", "позиции", "позиций");
  }

  function splitToppingLabel(name) {
    const match = String(name).match(/^(.*?)\s*\((.+)\)\s*$/);
    if (!match) {
      return { primary: String(name), secondary: "" };
    }
    return {
      primary: match[1].trim(),
      secondary: match[2].trim()
    };
  }

  function toDisplayCase(text) {
    const value = String(text || "").trim().toLowerCase();
    if (!value) return "";
    return value.charAt(0).toUpperCase() + value.slice(1);
  }

  function getDisplayName(item) {
    if (!item) return "";
    return item.displayName || toDisplayCase(item.name);
  }

  function getDishMeta(item) {
    if (!item) return "";
    return [item.portionText, item.weightText, item.caloriesText]
      .filter(Boolean)
      .join(" · ");
  }

  function getActiveDynamicBadges(item, removedIngredients = []) {
    if (!item || !Array.isArray(item.dynamicBadges)) return [];
    return item.dynamicBadges
      .filter((badge) => Array.isArray(badge.requiresRemoved) && badge.requiresRemoved.every((name) => removedIngredients.includes(name)))
      .map((badge) => badge.label);
  }

  function renderBadgeRow(item, removedIngredients = []) {
    const badges = [];
    if (item.badge) {
      badges.push(`<span class="badge badge-soft">${escapeHtml(item.badge)}</span>`);
    }
    getActiveDynamicBadges(item, removedIngredients).forEach((label) => {
      badges.push(`<span class="badge badge-lead">${escapeHtml(label)}</span>`);
    });
    if (!badges.length) return "";
    return `<div class="badge-row">${badges.join("")}</div>`;
  }

  function renderVariantBlock(item) {
    if (!item.variants) return "";
    return `
      <div class="option-heading">Выберите формат</div>
      <div class="variant-scroll">
        ${item.variants.map((variant, index) => `
          <button type="button" class="variant-chip${index === 0 ? " selected" : ""}" onclick="toggleVariant(this)" data-label="${escapeHtml(variant.label)}" data-price="${variant.price}">
            ${escapeHtml(variant.label)}
            <span>${formatPrice(variant.price)}</span>
          </button>
        `).join("")}
      </div>
    `;
  }

  function renderRemovableIngredients(item) {
    if (!item.removableIngredients || !item.removableIngredients.length) return "";
    return `
      <div class="tags-label">Состав</div>
      <div class="tags-row">
        ${item.removableIngredients.map((ingredient) => `
          <button
            type="button"
            class="tag tag-remove"
            onclick="toggleIngredient(this)"
            data-name="${escapeHtml(ingredient)}"
          >${escapeHtml(ingredient)}</button>
        `).join("")}
      </div>
    `;
  }

  function renderToppings(item) {
    if (!item.toppingPools || !item.toppingPools.length) return "";
    return item.toppingPools.map((poolId) => {
      const pool = TOPPING_POOLS[poolId];
      return `
        <div class="tops-group-block">
          <div class="tops-label">${pool.label}</div>
          <div class="tops-tabs">
            ${pool.groups.map((group, index) => `
              <button type="button" class="tops-tab${index === 0 ? " active" : ""}" onclick="toggleToppingGroup(this)" data-target="${item.id}-${poolId}-${group.id}">
                ${group.label}
              </button>
            `).join("")}
          </div>
          ${pool.groups.map((group, index) => `
            <div class="tops-scroll${index === 0 ? " active" : ""}" data-group-id="${item.id}-${poolId}-${group.id}">
              ${group.items.map((top) => {
                const display = splitToppingLabel(top.name);
                const media = top.imageSrc
                  ? `<img class="top-img" src="${escapeHtml(top.imageSrc)}" alt="${escapeHtml(display.primary)}">`
                  : group.imageSrc
                  ? `<img class="top-img" src="${escapeHtml(group.imageSrc)}" alt="">`
                  : `<div class="top-icon">${group.icon}</div>`;
                return `
                <button type="button" class="top-card" onclick="toggleTopping(this)" data-name="${escapeHtml(top.name)}" data-price="${top.price}">
                  ${media}
                  <div class="top-name">${escapeHtml(display.primary)}</div>
                  ${display.secondary ? `<div class="top-note">${escapeHtml(display.secondary)}</div>` : ""}
                  <div class="top-price">+${formatPrice(top.price)}</div>
                </button>
              `;
              }).join("")}
            </div>
          `).join("")}
        </div>
      `;
    }).join("");
  }

  function flashAddButton(button) {
    if (!button) return;
    button.textContent = "✓";
    button.classList.add("done");
    setTimeout(() => {
      button.textContent = "+";
      button.classList.remove("done");
    }, 1200);
  }

  function renderGroupedCard(section, item) {
    const displayName = getDisplayName(item);
    return `
      <div class="card packaged-card" data-cat="${section.id}">
        <div class="card-top">
          <div class="card-top-text">
            <div class="dish-name">${escapeHtml(displayName)}</div>
          </div>
          <div class="group-photo-ph">${item.emoji || "🥤"}</div>
        </div>
        <div class="card-body">
          ${item.note ? `<div class="dish-desc">${escapeHtml(item.note)}</div>` : ""}
          <div class="group-list">
            ${item.groupedItems.map((entry, index) => {
              const entryId = `${item.id}-${entry.id || index}`;
              ITEM_INDEX.set(entryId, {
                id: entryId,
                name: entry.name || entry.displayName,
                displayName: entry.displayName || toDisplayCase(entry.name),
                metaText: [displayName, entry.note].filter(Boolean).join(" · "),
                sectionId: section.id,
                sectionLabel: section.label,
                basePrice: entry.price
              });
              return `
                <div class="group-row">
                  <div class="group-copy">
                    <div class="group-name">${escapeHtml(entry.displayName || toDisplayCase(entry.name))}</div>
                    ${entry.note ? `<div class="group-note">${escapeHtml(entry.note)}</div>` : ""}
                  </div>
                  <div class="group-actions">
                    <div class="group-price">${formatPrice(entry.price)}</div>
                    <button type="button" class="group-add" data-item-id="${escapeHtml(entryId)}" onclick="addGroupedCart(this)">+</button>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      </div>
    `;
  }

  function renderCard(section, item) {
    if (item.groupedItems) {
      return renderGroupedCard(section, item);
    }
    const displayName = getDisplayName(item);
    const metaText = getDishMeta(item);
    ITEM_INDEX.set(item.id, { ...item, displayName, metaText, sectionId: section.id, sectionLabel: section.label });
    const initialPrice = item.variants ? item.variants[0].price : item.basePrice;
    return `
      <div class="card${item.variants ? " multi-size" : item.toppingPools ? " base-with-toppings" : " single-price"}" data-item-id="${item.id}" data-cat="${section.id}">
        <div class="card-top">
          <div class="card-top-text">
            <div class="card-badges">${renderBadgeRow(item)}</div>
            <div class="dish-name">${escapeHtml(displayName)}</div>
          </div>
          ${item.imageSrc
            ? `<img class="dish-photo${item.photoClass ? ` ${escapeHtml(item.photoClass)}` : ""}" src="${escapeHtml(item.imageSrc)}" alt="${escapeHtml(displayName)}">`
            : `<div class="dish-photo-ph">${item.emoji || "🍽"}</div>`}
        </div>
        <div class="card-body">
          ${item.note ? `<div class="dish-desc">${escapeHtml(item.note)}</div>` : ""}
          ${renderVariantBlock(item)}
          ${renderRemovableIngredients(item)}
          ${renderToppings(item)}
          <div class="card-footer">
            <span class="dish-weight">${escapeHtml(metaText || "")}</span>
            <div class="card-actions">
              <div class="price-pill">${formatPrice(initialPrice)}</div>
              <button class="add-circle" data-base="${initialPrice}" onclick="addCart(this)">+</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderMenu() {
    const html = MENU_SECTIONS.map((section) => `
      <section
        class="menu-section"
        id="section-${section.id}"
        data-section-id="${section.id}"
        data-top-nav="${TOP_NAV_BY_SECTION[section.id]}"
      >
        <div class="section-label">${section.icon} ${section.label}</div>
        ${section.items.map((item) => renderCard(section, item)).join("")}
      </section>
    `).join("");
    document.getElementById("list").innerHTML = html;
  }

  function getCount() {
    return cartItems.reduce((sum, item) => sum + item.qty, 0);
  }

  function getTotal() {
    return cartItems.reduce((sum, item) => sum + item.price * item.qty, 0);
  }

  function getBaseSelection(card) {
    const selectedVariant = card.querySelector(".variant-chip.selected");
    if (!selectedVariant) {
      const btn = card.querySelector(".add-circle");
      return { label: "", price: parseInt(btn.dataset.base, 10) };
    }
    return {
      label: selectedVariant.dataset.label,
      price: parseInt(selectedVariant.dataset.price, 10)
    };
  }

  function getSelectedToppings(card) {
    return [...card.querySelectorAll(".top-card.selected")].map((top) => ({
      name: top.dataset.name,
      price: parseInt(top.dataset.price, 10)
    }));
  }

  function getRemovedIngredients(card) {
    return [...card.querySelectorAll(".tag-remove.removed")].map((tag) => tag.dataset.name);
  }

  function updateCardBadges(card) {
    const item = ITEM_INDEX.get(card.dataset.itemId);
    const badgeRow = card.querySelector(".card-badges");
    if (!item || !badgeRow) return;
    badgeRow.innerHTML = renderBadgeRow(item, getRemovedIngredients(card));
  }

  function getSignature(itemId, variantLabel, toppings, removedIngredients) {
    const toppingSignature = toppings.map((top) => top.name).sort().join("|");
    const ingredientSignature = [...removedIngredients].sort().join("|");
    return [itemId, variantLabel || "", toppingSignature, ingredientSignature].join("::");
  }

  function updateCardPrice(card) {
    const base = getBaseSelection(card);
    const extra = getSelectedToppings(card).reduce((sum, top) => sum + top.price, 0);
    const total = base.price + extra;
    card.querySelector(".price-pill").textContent = formatPrice(total);
  }

  function toggleVariant(el) {
    const card = el.closest(".card");
    card.querySelectorAll(".variant-chip").forEach((chip) => chip.classList.remove("selected"));
    el.classList.add("selected");
    updateCardPrice(card);
  }

  function toggleToppingGroup(el) {
    const block = el.closest(".tops-group-block");
    block.querySelectorAll(".tops-tab").forEach((tab) => tab.classList.remove("active"));
    block.querySelectorAll(".tops-scroll").forEach((scroll) => scroll.classList.remove("active"));
    el.classList.add("active");
    const target = block.querySelector(`[data-group-id="${el.dataset.target}"]`);
    if (target) target.classList.add("active");
  }

  function toggleTopping(el) {
    el.classList.toggle("selected");
    updateCardPrice(el.closest(".card"));
  }

  function toggleIngredient(el) {
    el.classList.toggle("removed");
    updateCardBadges(el.closest(".card"));
  }

  function addCart(btn) {
    const card = btn.closest(".card");
    const item = ITEM_INDEX.get(card.dataset.itemId);
    const base = getBaseSelection(card);
    const toppings = getSelectedToppings(card);
    const removedIngredients = getRemovedIngredients(card);
    const stateLabels = getActiveDynamicBadges(item, removedIngredients);
    const extra = toppings.reduce((sum, top) => sum + top.price, 0);
    const price = base.price + extra;
    const signature = getSignature(item.id, base.label, toppings, removedIngredients);
    const existing = cartItems.find((entry) => entry.signature === signature);

    if (existing) {
      existing.qty += 1;
      existing.stateLabels = stateLabels;
    } else {
      cartItems.push({
        id: Date.now() + Math.floor(Math.random() * 1000),
        signature,
        itemId: item.id,
        name: item.name,
        displayName: item.displayName,
        metaText: item.metaText,
        sectionLabel: item.sectionLabel,
        variantLabel: base.label,
        stateLabels,
        tops: toppings.map((top) => top.name),
        removedIngredients,
        price,
        qty: 1
      });
    }

    flashAddButton(btn);
    updateCartDisplay();
  }

  function addGroupedCart(btn) {
    const item = ITEM_INDEX.get(btn.dataset.itemId);
    if (!item) return;

    const signature = getSignature(item.id, "", [], []);
    const existing = cartItems.find((entry) => entry.signature === signature);

    if (existing) {
      existing.qty += 1;
    } else {
      cartItems.push({
        id: Date.now() + Math.floor(Math.random() * 1000),
        signature,
        itemId: item.id,
        name: item.name,
        displayName: item.displayName,
        metaText: item.metaText,
        sectionLabel: item.sectionLabel,
        variantLabel: "",
        stateLabels: [],
        tops: [],
        removedIngredients: [],
        price: item.basePrice,
        qty: 1
      });
    }

    flashAddButton(btn);
    updateCartDisplay();
  }

  function updateCartDisplay() {
    const count = getCount();
    const total = getTotal();
    const bubble = document.getElementById("bubble");
    bubble.textContent = count;
    bubble.classList.remove("pop");
    void bubble.offsetWidth;
    bubble.classList.add("pop");
    setTimeout(() => bubble.classList.remove("pop"), 300);

    document.getElementById("cart-total").textContent = formatPrice(total);
    document.getElementById("cart-grand").textContent = formatPrice(total);
    document.getElementById("cart-sub").textContent = formatItemCount(count);

    const cart = document.getElementById("cart");
    if (count > 0) {
      cart.classList.add("show");
    } else {
      cart.classList.remove("show");
      closeCart();
    }

    if (cart.classList.contains("open")) {
      renderCartItems();
    }

    saveCart();
  }

  function renderCartItems() {
    const cartItemsEl = document.getElementById("cart-items");
    if (!cartItems.length) {
      cartItemsEl.innerHTML = '<div class="cart-empty">Корзина пока пустая</div>';
      return;
    }

    cartItemsEl.innerHTML = cartItems.map((item) => {
      const meta = [item.sectionLabel];
      if (item.variantLabel) meta.push(item.variantLabel);
      return `
        <div class="cart-item-row">
          <div style="flex: 1; min-width: 0;">
            <div class="cart-item-name">${escapeHtml(item.displayName || toDisplayCase(item.name))}</div>
            <div class="cart-item-meta">${[...meta, ...(Array.isArray(item.stateLabels) ? item.stateLabels : []), item.metaText].filter(Boolean).map(escapeHtml).join(" · ")}</div>
            ${item.tops.length ? `<div class="cart-item-tops">${item.tops.map(escapeHtml).join(", ")}</div>` : ""}
            ${item.removedIngredients.length ? `<div class="cart-item-tops">Убрать: ${item.removedIngredients.map(escapeHtml).join(", ")}</div>` : ""}
          </div>
          <div class="qty-row">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
          <div class="cart-item-price">${formatPrice(item.price * item.qty)}</div>
        </div>
      `;
    }).join("");
  }

  function changeQty(id, delta) {
    const item = cartItems.find((entry) => entry.id === id);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
      cartItems = cartItems.filter((entry) => entry.id !== id);
    }
    updateCartDisplay();
    renderCartItems();
  }

  function openCart() {
    if (getCount() === 0) return;
    renderCartItems();
    document.getElementById("cart").classList.add("open");
    document.getElementById("cart-overlay").classList.add("show");
  }

  function closeCart() {
    document.getElementById("cart").classList.remove("open");
    document.getElementById("cart-overlay").classList.remove("show");
  }

  function updateHeaderOffset() {
    const header = document.querySelector(".header");
    if (!header) return 0;
    const height = header.offsetHeight;
    document.documentElement.style.setProperty("--header-offset", height + "px");
    return height;
  }

  function keepButtonVisible(button) {
    if (!button) return;
    button.scrollIntoView({ inline: "center", block: "nearest" });
  }

  function setActiveNav(topId, drinkId = activeDrinkNav) {
    const drinkNav = document.getElementById("drink-nav");
    const showDrinks = topId === "drinks";
    const nextDrinkId = DRINK_NAV_ITEMS.some((item) => item.id === drinkId) ? drinkId : activeDrinkNav;
    const topChanged = activeTopNav !== topId;
    const drinkChanged = activeDrinkNav !== nextDrinkId;
    const subnavWasVisible = drinkNav.classList.contains("show");

    activeTopNav = topId;
    activeDrinkNav = nextDrinkId;

    document.querySelectorAll("[data-top-nav]").forEach((button) => {
      button.classList.toggle("active", button.dataset.topNav === topId);
    });

    drinkNav.classList.toggle("show", showDrinks);
    document.querySelectorAll("[data-drink-nav]").forEach((button) => {
      button.classList.toggle("active", showDrinks && button.dataset.drinkNav === activeDrinkNav);
    });

    if (topChanged) {
      keepButtonVisible(document.querySelector(`[data-top-nav="${topId}"]`));
    }
    if (showDrinks && (topChanged || drinkChanged)) {
      keepButtonVisible(document.querySelector(`[data-drink-nav="${activeDrinkNav}"]`));
    }
    if (subnavWasVisible !== showDrinks) {
      updateHeaderOffset();
    }
  }

  function getSectionTop(section) {
    const headerOffset = updateHeaderOffset() + 14;
    return window.scrollY + section.getBoundingClientRect().top - headerOffset;
  }

  function scrollToSection(sectionId) {
    const target = document.querySelector(`#section-${sectionId}`);
    if (!target) return;

    if (DRINK_SECTION_IDS.includes(sectionId)) {
      setActiveNav("drinks", sectionId);
    } else {
      setActiveNav(TOP_NAV_BY_SECTION[sectionId] || "blini");
    }

    window.scrollTo({
      top: Math.max(getSectionTop(target), 0),
      behavior: "smooth"
    });
  }

  function getCurrentSectionId() {
    const sections = [...document.querySelectorAll(".menu-section")];
    const probeLine = updateHeaderOffset() + 24;
    let currentId = sections[0]?.dataset.sectionId || "blini";

    for (const section of sections) {
      if (section.getBoundingClientRect().top <= probeLine) {
        currentId = section.dataset.sectionId;
      } else {
        break;
      }
    }

    return currentId;
  }

  function syncNavWithScroll() {
    if (window.scrollY < 36) {
      setActiveNav("blini", "coffee");
      return;
    }

    const sectionId = getCurrentSectionId();
    if (DRINK_SECTION_IDS.includes(sectionId)) {
      setActiveNav("drinks", sectionId);
      return;
    }

    setActiveNav(TOP_NAV_BY_SECTION[sectionId] || "blini");
  }

  function handleScroll() {
    if (scrollTicking) return;
    scrollTicking = true;
    window.requestAnimationFrame(() => {
      syncNavWithScroll();
      scrollTicking = false;
    });
  }

  function orderTap() {
    if (getCount() > 0) {
      alert("Заказ на " + formatPrice(getTotal()) + " отправлен! Подключим реальную отправку следующим шагом.");
    }
  }

  function saveCart() {
    localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cartItems));
  }

  function loadCart() {
    try {
      const saved = JSON.parse(localStorage.getItem(CART_STORAGE_KEY) || "[]");
      if (Array.isArray(saved)) {
        cartItems = saved.map((item) => ({
          ...item,
          tops: Array.isArray(item.tops) ? item.tops : [],
          stateLabels: Array.isArray(item.stateLabels) ? item.stateLabels : [],
          removedIngredients: Array.isArray(item.removedIngredients) ? item.removedIngredients : [],
          displayName: item.displayName || toDisplayCase(item.name),
          metaText: item.metaText || ""
        }));
      }
    } catch (error) {
      cartItems = [];
    }
  }

  renderMenu();
  loadCart();
  updateCartDisplay();
  updateHeaderOffset();
  syncNavWithScroll();

  window.addEventListener("resize", () => {
    updateHeaderOffset();
    syncNavWithScroll();
  });
  window.addEventListener("scroll", handleScroll, { passive: true });
</script>
</body>
</html>
